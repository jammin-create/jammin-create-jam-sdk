name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jammin-version: ["0.2.2", "latest"]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install jammin
        run: bun install -g @fluffylabs/jammin@${{ matrix.jammin-version }}

      - name: jammin build
        run: jammin build

      - name: jammin test
        run: jammin test
